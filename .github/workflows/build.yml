name: Build test
on:
  workflow_dispatch:
    inputs:
      GIT_TOKEN:
        description: 'Github Token' 
        required: true
        default: ''

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Export
      run: export GITHUB_TOKEN="${{ github.event.inputs.GIT_TOKEN }}"
    - name: Install dependencies
      run: bash ci.sh deps
    - name: Build LLVM
      run: bash ci.sh llvm
    - name: Build binutils
      run: bash ci.sh binutils
    # - name: Build kernel
    #  run: bash ci.sh kernel
    - name: Check clang version
      run: bash ci.sh clangversion
    - name: Create release
      run: bash ci.sh createrelease
    - name: Upload file
      run: bash ci.sh uploadasset
